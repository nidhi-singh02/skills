<!DOCTYPE html>
<!--
  MEDIUM FEATURED-IMAGE TEMPLATE  (1600x840, ~1.91:1)
  Centered variant of cover-template.html. 1600x840 needs almost no crop in Medium/Twitter cards;
  the centered composition survives squarer crops too. Export under 500KB.
  Render + logo recipe: see references/cover-render.md. Same EDIT points as cover-template.html
  (headline + accent + subline; the 3 nodes' labels/logos; which node is the hero).
  If the video isn't a 3-node story, keep a bold centered text-only headline instead.
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<style>
  @font-face{font-family:departureMono;src:url('./departure.woff2') format('woff2');font-display:block;font-weight:400}
  :root{
    --bg:#0a0a0c; --ink:#f2f2f4; --ink-mut:#7b7b86;
    --accent:#8b6cff;                 /* EDIT: headline number/$ accent */
    --display:departureMono,monospace; /* headline font. dev default; swap for warmer topics */
    --glow:rgba(124,92,240,.15);       /* glows are VIOLET by default — recolour to brand */
    --glow2:rgba(86,211,166,.06);
    --hero-glow:0 0 74px rgba(124,92,240,.5), 0 0 24px rgba(135,170,235,.45), 0 20px 56px rgba(91,63,214,.32);
    --mono:"SF Mono",ui-monospace,"JetBrains Mono",Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1600px;height:840px}
  body{
    background:var(--bg);color:var(--ink);overflow:hidden;
    background-image:                  /* glows via vars — recolour --glow/--glow2 to the brand */
      radial-gradient(1100px 560px at 50% 66%, var(--glow), transparent 62%),
      radial-gradient(720px 420px at 88% 8%, var(--glow2), transparent 60%);
  }
  /* headline, centered near top */
  .title{position:absolute;left:0;right:0;top:78px;text-align:center;padding:0 96px}
  .title h1{font-family:var(--display);font-size:52px;letter-spacing:0;color:var(--ink);line-height:1.5}
  .title h1 .v{color:var(--accent)}
  .title .sub3{font-family:var(--display);font-size:24px;color:var(--ink-mut);margin-top:18px}
  /* diagram, centered lower */
  .rail{position:absolute;left:330px;width:940px;top:560px;height:1px;z-index:1;
        background:linear-gradient(90deg,transparent,#2c2c36 10%,#2c2c36 90%,transparent)}
  .orb{position:absolute;top:560px;transform:translate(-50%,-50%);z-index:3}
  .disc{border-radius:50%;display:flex;align-items:center;justify-content:center;
        background:radial-gradient(circle at 38% 30%, #20202a, #0d0d12 74%);
        border:1px solid rgba(255,255,255,.09);position:relative}
  .disc::after{content:"";position:absolute;inset:0;border-radius:50%;box-shadow:inset 0 1px 0 rgba(255,255,255,.10)}
  .disc img.invert{filter:brightness(0) invert(1);opacity:.96}
  .disc.light{background:#f1efe8;overflow:hidden}
  .disc.light img{width:100%;height:100%;object-fit:cover;object-position:48% 33%;transform:scale(1.22)}
  .hero{width:262px;height:262px;border-radius:50%;box-shadow:var(--hero-glow)}
  .hero img{width:100%;height:100%;display:block;border-radius:50%}
  .lbl{position:absolute;top:716px;transform:translateX(-50%);text-align:center}
  .lbl .nm{font-family:var(--display);font-size:34px;color:var(--ink);line-height:1}
  .lbl .sb{font-family:var(--mono);font-size:16px;color:var(--ink-mut);margin-top:13px;line-height:1}
</style>
</head>
<body>
  <!-- EDIT: headline. Title Case, accent on the number/$, no trailing period. -->
  <div class="title">
    <h1>Your Benefit Headline<br>Ending In <span class="v">$0</span></h1>
    <div class="sub3">(One Muted Qualifier Line)</div>
  </div>

  <!-- EDIT: the 3 nodes (drop the logos + departure.woff2 in this folder before rendering) -->
  <div class="rail"></div>
  <div class="orb" style="left:330px">
    <div class="disc light" style="width:168px;height:168px;box-shadow:0 0 54px rgba(120,140,180,.30)">
      <img src="left_logo.png" alt="" />
    </div>
  </div>
  <div class="orb" style="left:800px">
    <div class="hero"><img src="hero_logo.svg" alt="" /></div>
  </div>
  <div class="orb" style="left:1270px">
    <div class="disc" style="width:168px;height:168px;box-shadow:0 0 54px rgba(86,211,166,.30)">
      <img class="invert" src="right_logo.png" alt="" style="height:104px" />
    </div>
  </div>

  <div class="lbl" style="left:330px"><div class="nm">Left Node</div><div class="sb">subtitle</div></div>
  <div class="lbl" style="left:800px"><div class="nm">Hero Node</div><div class="sb">subtitle</div></div>
  <div class="lbl" style="left:1270px"><div class="nm">Right Node</div><div class="sb">subtitle</div></div>
</body>
</html>
